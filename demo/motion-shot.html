<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reflect Glass Button Motion Demo</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23d9f1ff'/%3E%3Cstop offset='100%25' stop-color='%235aa7ea'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect x='8' y='8' width='48' height='48' rx='18' fill='url(%23g)' fill-opacity='.92' stroke='rgba(255,255,255,.92)'/%3E%3Cpath d='M18 24c8-8 20-8 28 0' fill='none' stroke='white' stroke-width='5' stroke-linecap='round' opacity='.78'/%3E%3Cpath d='M20 38c7 5 17 5 24 0' fill='none' stroke='white' stroke-width='4' stroke-linecap='round' opacity='.52'/%3E%3C/svg%3E"
    />
    <script>
      (() => {
        const brands = navigator.userAgentData?.brands || [];
        const brandMatch =
          Array.isArray(brands) &&
          brands.some(item =>
            /Chromium|Google Chrome|Microsoft Edge|Opera/i.test(item.brand)
          );
        const ua = navigator.userAgent || "";
        const isIOS = /\b(iPad|iPhone|iPod)\b/.test(ua);
        const uaMatch =
          !isIOS &&
          /\b(?:Chromium|Chrome|Edg|OPR|SamsungBrowser)\//.test(ua) &&
          !/\b(?:Firefox|FxiOS)\//.test(ua);
        const isChromium = brandMatch || uaMatch;
        const root = document.documentElement;
        root.dataset.browserEngine = isChromium ? "chromium" : "default";
        root.classList.toggle("browser-chromium", isChromium);
      })();
    </script>
    <link rel="stylesheet" href="../src/reflect-glass-button.css" />
    <link rel="stylesheet" href="./motion-shot.css" />
  </head>
  <body>
    <svg
      aria-hidden="true"
      width="0"
      height="0"
      style="position: absolute; pointer-events: none"
    >
      <defs>
        <filter id="reflectGlassMotion" color-interpolation-filters="sRGB">
          <feGaussianBlur in="SourceGraphic" stdDeviation="0.8" result="blurredSource" />
          <feImage
            href="../assets/motion-pill/displacement-map.png"
            x="0"
            y="0"
            width="320"
            height="120"
            preserveAspectRatio="none"
            result="displacementMap"
          />
          <feDisplacementMap
            in="blurredSource"
            in2="displacementMap"
            scale="62"
            xChannelSelector="R"
            yChannelSelector="G"
            result="displaced"
          />
          <feColorMatrix
            in="displaced"
            type="saturate"
            values="5.2"
            result="displacedSaturated"
          />
          <feImage
            href="../assets/motion-pill/specular-map.png"
            x="0"
            y="0"
            width="320"
            height="120"
            preserveAspectRatio="none"
            result="specularLayer"
          />
          <feComposite
            in="displacedSaturated"
            in2="specularLayer"
            operator="in"
            result="specularSaturated"
          />
          <feComponentTransfer in="specularLayer" result="specularFaded">
            <feFuncA type="linear" slope="0.42" />
          </feComponentTransfer>
          <feBlend
            in="specularSaturated"
            in2="displaced"
            mode="normal"
            result="withSpecular"
          />
          <feBlend in="specularFaded" in2="withSpecular" mode="normal" />
        </filter>
      </defs>
    </svg>

    <main class="motion-shell">
      <section class="motion-stage">
        <div class="motion-backdrop motion-grid" aria-hidden="true"></div>
        <div class="motion-backdrop motion-noise" aria-hidden="true"></div>
        <div class="motion-backdrop motion-flares" aria-hidden="true"></div>

        <header class="motion-header">
          <p class="motion-kicker">Motion Preview</p>
          <h1>Drag the glass over dense text and saturated color.</h1>
        </header>

        <section class="motion-panel">
          <div class="motion-lane" aria-hidden="true">
            <span class="lane-ribbon lane-ribbon-a"></span>
            <span class="lane-ribbon lane-ribbon-b"></span>
            <span class="lane-ribbon lane-ribbon-c"></span>
            <span class="lane-ribbon lane-ribbon-d"></span>
          </div>

          <div class="motion-copy">
            <div class="copy-block">
              <span class="copy-tag">field report</span>
              <p>
                High contrast microcopy behind the button makes the refraction
                easier to read while the button crosses multiple layers.
              </p>
            </div>

            <div class="copy-lines" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </div>

            <div class="copy-table" aria-hidden="true">
              <span>alpha</span>
              <span>0.84</span>
              <span>gamma</span>
              <span>0.58</span>
              <span>delta</span>
              <span>0.93</span>
              <span>theta</span>
              <span>0.61</span>
            </div>
          </div>

          <div class="motion-anchor reflect-glass-anchor" aria-hidden="true"></div>
        </section>
      </section>

      <button
        class="reflect-glass-button motion-glass-button"
        data-reflect-glass
        type="button"
        aria-label="Pure glass motion button"
      >
        <span class="reflect-glass-surface" aria-hidden="true"></span>
        <span class="reflect-glass-ornament" aria-hidden="true"></span>
        <span class="reflect-glass-label" aria-hidden="true"></span>
      </button>
    </main>

    <script src="../src/reflect-glass-button.js"></script>
    <script>
      window.ReflectGlassButton.init();
    </script>
  </body>
</html>
